<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Default Risk Predictor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px;
            background: linear-gradient(180deg, #f6f8fb 0%, #eef1f6 100%);
            color: #1a202c;
        }

        .header { text-align: center; margin-bottom: 32px; }
        .header .icon-badge {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            font-size: 26px; color: white;
        }
        .header h1 { margin: 0 0 6px; font-size: 26px; font-weight: 700; }
        .header p { margin: 0; color: #718096; font-size: 14px; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid #edf0f5;
        }

        .section-title {
            font-size: 13px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: #a0aec0;
            margin: 24px 0 12px;
        }
        .section-title:first-child { margin-top: 0; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group { margin-bottom: 0; }
        label {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 6px; font-weight: 600; color: #4a5568; font-size: 13px;
        }
        label i { color: #a0aec0; font-size: 15px; }

        input, select {
            width: 100%;
            padding: 11px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            color: #2d3748;
            background: #fafbfc;
            transition: border-color 0.2s, background 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        button#submitBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
            font-weight: 700;
            margin-top: 28px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        button#submitBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.35); }
        button#submitBtn:active { transform: translateY(0); }

        #processing { display: none; text-align: center; padding: 50px 20px; }
        .spinner {
            width: 44px; height: 44px; margin: 0 auto 18px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #processing p { color: #718096; font-size: 14px; font-weight: 500; }
        #processing .sub { color: #a0aec0; font-size: 12px; margin-top: 4px; }

        #result { display: none; }
        .result-card {
            border-radius: 16px;
            padding: 36px 28px;
            text-align: center;
            color: white;
            animation: fadeIn 0.45s ease;
            position: relative;
            overflow: hidden;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .result-card.low-risk { background: linear-gradient(135deg, #48bb78 0%, #2f855a 100%); }
        .result-card.high-risk { background: linear-gradient(135deg, #f56565 0%, #b02e2e 100%); }

        .risk-icon-badge {
            width: 60px; height: 60px; margin: 0 auto 14px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        .risk-percentage { font-size: 46px; font-weight: 800; margin: 4px 0; letter-spacing: -1px; }
        .risk-label { font-size: 17px; font-weight: 700; opacity: 0.95; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 0.5px; }
        .risk-message { font-size: 14px; opacity: 0.92; line-height: 1.6; max-width: 400px; margin: 0 auto; }

        .progress-bar-bg {
            background: rgba(255,255,255,0.25);
            border-radius: 20px; height: 8px;
            margin: 4px auto 20px; max-width: 320px;
            overflow: hidden;
        }
        .progress-bar-fill { height: 100%; background: white; border-radius: 20px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

        #tryAgainBtn {
            margin-top: 18px;
            background: white;
            border: 1.5px solid #e2e8f0;
            color: #4a5568;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: background 0.2s;
        }
        #tryAgainBtn:hover { background: #f7fafc; }

        @media (max-width: 480px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="icon-badge">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L4 6v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V6l-8-4z"/>
        <path d="M9 12l2 2 4-4"/>
    </svg>
</div>
        <h1>Loan default risk predictor</h1>
        <p>Machine learning model trained on 300k+ historical loan applications</p>
    </div>

    <div class="card" id="formCard">
        <form id="predictForm">
            <div class="section-title">Applicant profile</div>
            <div class="grid-2">
                <div class="form-group">
                    <label><i class="ti ti-user"></i> Age (years)</label>
                    <input type="number" name="age" value="35" required>
                </div>
                <div class="form-group">
                    <label><i class="ti ti-briefcase"></i> Years employed</label>
                    <input type="number" name="years_employed" value="5" required>
                </div>
                <div class="form-group">
                    <label><i class="ti ti-gender-bigender"></i> Gender</label>
                    <select name="gender">
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="ti ti-heart"></i> Family status</label>
                    <select name="family_status">
                        <option value="Married">Married</option>
                        <option value="Single / not married">Single</option>
                        <option value="Civil marriage">Civil marriage</option>
                        <option value="Widow">Widow</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="ti ti-school"></i> Education</label>
                    <select name="education">
                        <option value="Secondary / secondary special">Secondary</option>
                        <option value="Higher education">Higher education</option>
                        <option value="Incomplete higher">Incomplete higher</option>
                        <option value="Lower secondary">Lower secondary</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="ti ti-car"></i> Owns a car?</label>
                    <select name="own_car">
                        <option value="N">No</option>
                        <option value="Y">Yes</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Loan details</div>
            <div class="grid-2">
                <div class="form-group">
                    <label><i class="ti ti-cash"></i> Annual income</label>
                    <input type="number" name="amt_income_total" value="150000" required>
                </div>
                <div class="form-group">
                    <label><i class="ti ti-credit-card"></i> Loan credit amount</label>
                    <input type="number" name="amt_credit" value="500000" required>
                </div>
                <div class="form-group">
                    <label><i class="ti ti-calendar-repeat"></i> Annuity (monthly)</label>
                    <input type="number" name="amt_annuity" value="25000" required>
                </div>
                <div class="form-group">
                    <label><i class="ti ti-tag"></i> Goods price</label>
                    <input type="number" name="amt_goods_price" value="450000" required>
                </div>
            </div>

            <button type="submit" id="submitBtn"><i class="ti ti-chart-bar"></i> Predict default risk</button>
        </form>
    </div>

    <div class="card" id="processing">
        <div class="spinner"></div>
        <p>Analyzing applicant data</p>
        <div class="sub">Running LightGBM model inference</div>
    </div>

    <div id="result">
        <div class="result-card" id="resultCard">
            <div class="risk-icon-badge" id="riskIconBadge"><i id="riskIcon" class="ti"></i></div>
            <div class="risk-percentage" id="riskPercentage"></div>
            <div class="risk-label" id="riskLabel"></div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="risk-message" id="riskMessage"></div>
        </div>
        <button id="tryAgainBtn"><i class="ti ti-refresh"></i> Try another applicant</button>
    </div>

    <script>
        const form = document.getElementById('predictForm');
        const formCard = document.getElementById('formCard');
        const processing = document.getElementById('processing');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            formCard.style.display = 'none';
            processing.style.display = 'block';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                const [response] = await Promise.all([
                    fetch('/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    }),
                    new Promise(res => setTimeout(res, 900))
                ]);

                const result = await response.json();
                processing.style.display = 'none';

                if (result.error) {
                    alert('Error: ' + result.error);
                    formCard.style.display = 'block';
                    return;
                }

                const prob = result.default_probability;
                const isHighRisk = result.risk_level === 'High Risk';

                document.getElementById('resultCard').className = 'result-card ' + (isHighRisk ? 'high-risk' : 'low-risk');
                document.getElementById('riskIcon').className = 'ti ' + (isHighRisk ? 'ti-alert-triangle' : 'ti-check');
                document.getElementById('riskPercentage').textContent = result.risk_percentage;
                document.getElementById('riskLabel').textContent = result.risk_level;
                document.getElementById('progressBar').style.width = (prob * 100) + '%';
                document.getElementById('riskMessage').textContent = isHighRisk
                    ? 'This applicant shows a higher likelihood of default based on the provided financial profile. Further review recommended.'
                    : 'This applicant shows a lower likelihood of default based on the provided financial profile.';

                resultDiv.style.display = 'block';

            } catch (err) {
                processing.style.display = 'none';
                formCard.style.display = 'block';
                alert('Something went wrong: ' + err.message);
            }
        });

        document.getElementById('tryAgainBtn').addEventListener('click', () => {
            resultDiv.style.display = 'none';
            formCard.style.display = 'block';
        });
    </script>
</body>
</html>
